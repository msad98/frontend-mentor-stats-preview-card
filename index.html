<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Stats preview card component</title>
</head>

<body>
  <div class="wrapper">
    <div class="card-image">
    </div>
    <div class="card-content">
      <h2>Get <span class="purple-text">insights</span> that help your business grow.</h2>
      <p class="description">Discover the benefits of data analytics and make better decisions regarding revenue,
        customer experience, and
        overall efficiency.
      </p>
      <p class="stats">
        <span class="value">10k+</span><br>
        <span class="key">COMPANIES</span>
      </p>

      <p class="stats">
        <span class="value">314</span><br>
        <span class="key">TEMPLATES</span>
      </p>

      <p class="stats">
        <span class="value">12M+</span><br>
        <span class="key">QUERIES</span>
      </p>
    </div>

  </div>

</body>

</html>
